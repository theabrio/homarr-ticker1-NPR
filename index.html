<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>News Ticker</title>
<style>
  /* THIS IS THE FIX: Forces the canvas to fill the entire Homarr tile */
  html, body {
    height: 100%;
    margin: 0;
    padding: 0;
  }
  
  body { 
    background-color: #ffffff; 
    color: #36495a;            
    font-family: sans-serif; 
    overflow: hidden; 
    display: flex; 
    align-items: center; /* This now perfectly centers the text vertically! */
  }
  .ticker-container { 
    width: 100%; 
    overflow: hidden; 
    white-space: nowrap; 
  }
  .ticker-text { 
    display: inline-block; 
    padding-left: 100%; 
    animation: ticker 120s linear infinite; 
    font-size: 1.2rem; 
  }
  
  .ticker-text:hover {
    animation-play-state: paused;
  }

  .ticker-text span {
    margin-right: 40px;
  }
  @keyframes ticker { 
    0% { transform: translateX(0); } 
    100% { transform: translateX(-100%); } 
  }
</style>
</head>
<body>

<div class="ticker-container">
  <div class="ticker-text" id="ticker">Loading latest headlines...</div>
</div>

<script>
  // Swapped to the Reuters feed based on your screenshot!
  const rssUrl = 'https://moxie.foxnews.com/google-publisher/latest.xml';
  const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`;
  
  fetch(apiUrl)
    .then(res => res.json())
    .then(data => {
      if (data.status === 'ok' && data.items.length > 0) {
        const headlines = data.items.map(item => `<span>${item.title} &nbsp;&nbsp;&nbsp;&bull;&nbsp;&nbsp;&nbsp;</span>`).join('');
        document.getElementById("ticker").innerHTML = headlines;
      } else {
        document.getElementById("ticker").innerHTML = "Feed is empty.";
      }
    })
    .catch(() => {
      document.getElementById("ticker").innerHTML = "Error loading feed.";
    });
</script>

</body>
</html>
