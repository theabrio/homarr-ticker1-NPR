<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  body { 
    margin: 0; 
    background-color: #1a1a1a;
    color: #ffffff; 
    font-family: sans-serif; 
    overflow: hidden; 
    display: flex; 
    align-items: center; 
    height: 100vh; 
  }
  .ticker-container { 
    width: 100%; 
    overflow: hidden; 
    white-space: nowrap; 
    box-sizing: border-box; 
  }
  .ticker-text { 
    display: inline-block; 
    padding-left: 100%; 
    animation: ticker 40s linear infinite; 
    font-size: 1.2rem; 
  }
  .ticker-text span {
    margin-right: 40px;
  }
  @keyframes ticker { 
    0% { transform: translate(0, 0); } 
    100% { transform: translate(-100%, 0); } 
  }
</style>
</head>
<body>

<div class="ticker-container">
  <div class="ticker-text" id="ticker">Loading latest headlines...</div>
</div>
<script>
  const rssUrl = 'https://rss.nytimes.com/services/xml/rss/nyt/HomePage.xml';
  
  // Using rss2json which Safari usually allows
  const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`;
  
  fetch(apiUrl)
    .then(response => response.json())
    .then(data => {
      let html = "";
      if (data.status === 'ok') {
        data.items.forEach(item => {
          html += `<span>${item.title} &nbsp;&nbsp;&nbsp;&bull;&nbsp;&nbsp;&nbsp; </span>`;
        });
        document.getElementById("ticker").innerHTML = html;
      } else {
        document.getElementById("ticker").innerHTML = "Feed format not supported.";
      }
    })
    .catch(error => {
      document.getElementById("ticker").innerHTML = "Safari is still blocking the connection!";
    });
</script>

</body>
</html>
